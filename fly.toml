app = "bespoke-web"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  AUTH_MODE = "local"
  ENVIRONMENT = "development"
  HOSTNAME = "0.0.0.0"
  INTERNAL_API_BASE_URL = "http://127.0.0.1:8000"
  NEXT_PUBLIC_API_BASE_URL = "/api"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
